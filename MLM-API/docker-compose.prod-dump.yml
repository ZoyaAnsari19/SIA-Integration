version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mlm-api-db-prod-dump
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: mlm_user
      POSTGRES_PASSWORD: mlm_password_2024
      POSTGRES_DB: mlm_commission
    volumes:
      - mlm_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlm_user"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mlm_prod_db_data:

