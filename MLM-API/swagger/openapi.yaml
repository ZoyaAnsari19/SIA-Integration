openapi: 3.0.3
info:
  title: MLM API
  version: 0.1.0
  description: MLM Commission System API with KYC verification
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/users/login
    adminAuth:
      type: http
      scheme: bearer
      description: Admin token (ADMIN_TOKEN from environment)
  schemas: {}
paths:
  /api/v1/sia/validate-refer/{displayId}:
    get:
      summary: Validate SIA Refer ID
      tags:
        - SIA Public
      description: Validate that a Refer ID belongs to an SIA user. Use from Secure
        Pharma / other SIA ecosystem apps to allow only SIA users as referrers.
        No auth required.
      parameters:
        - schema:
            type: string
          in: path
          name: displayId
          required: true
          description: Refer ID / display ID (e.g. SIA0011)
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_sia_user:
                    type: boolean
                    enum:
                      - true
                  display_id:
                    type: string
                    description: User display ID (Refer ID)
                  name:
                    type:
                      - "null"
                      - string
                    description: User name for display
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_sia_user:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
  /api/v1/auth/me:
    get:
      summary: Get Current User
      tags:
        - Authentication
      description: Get current authenticated user details
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      display_id:
                        type: string
                        nullable: true
                      name:
                        type: string
                        nullable: true
                      display_title:
                        type: string
                        nullable: true
                      display_title_icon_url:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      phone:
                        type: string
                        nullable: true
                      role:
                        type: string
                      kyc_status:
                        type: string
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Login
      tags:
        - Authentication
      description: User login - returns JWT token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - password
              properties:
                userId:
                  type: string
                  description: User ID (numeric), display_id, email, or mobile number (10 digits)
                password:
                  type: string
                  description: User password
        required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for authentication
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      display_id:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      name:
                        type: string
                        nullable: true
                      has_transaction_password:
                        type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/sponsor/{sponsorId}:
    get:
      operationId: getSponsorName
      summary: Get Sponsor Name
      tags:
        - Authentication
      description: Get sponsor name by sponsor ID
      parameters:
        - schema:
            type: string
          in: path
          name: sponsorId
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                    nullable: true
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/otp/send:
    post:
      operationId: sendOtp
      summary: Send OTP
      tags:
        - Authentication
      description: Send OTP to mobile number
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - mobile
              properties:
                mobile:
                  type: string
                  pattern: ^[0-9]{10}$
                  description: 10-digit mobile number
        required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/otp/verify:
    post:
      operationId: verifyOtp
      summary: Verify OTP
      tags:
        - Authentication
      description: Verify OTP
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - mobile
                - otp
              properties:
                mobile:
                  type: string
                  pattern: ^[0-9]{10}$
                otp:
                  type: string
                  pattern: ^[0-9]{6}$
        required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  verified:
                    type: boolean
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/email-otp/send:
    post:
      summary: Send Email OTP
      tags:
        - Authentication
      description: Send registration OTP to email (replaces SMS for register/add member)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
        required: true
      responses:
        "200":
          description: Default Response
  /api/v1/auth/email-otp/verify:
    post:
      summary: Verify Email OTP
      tags:
        - Authentication
      description: Verify registration email OTP
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: ^[0-9]{6}$
        required: true
      responses:
        "200":
          description: Default Response
  /api/v1/auth/register:
    post:
      operationId: registerUser
      summary: Register User
      tags:
        - Authentication
      description: Register a new user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  description: User full name
                email:
                  type: string
                  format: email
                  description: User email address
                mobile:
                  type: string
                  pattern: ^[0-9]{10}$
                  description: 10-digit mobile number
                password:
                  type: string
                  minLength: 6
                  description: User password (minimum 6 characters)
                referrer_user_id:
                  type: string
                  description: Referrer/Sponsor user ID
              required:
                - name
                - email
                - mobile
                - password
                - referrer_user_id
        required: true
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: User ID
                  display_id:
                    type: string
                    nullable: true
                    description: User display ID (e.g., SIA02000)
                  name:
                    type: string
                    nullable: true
                  email:
                    type: string
                    nullable: true
                  phone:
                    type: string
                    nullable: true
                  role:
                    type: string
                    enum:
                      - STUDENT
                      - ADMIN
                    description: User role
                  referrer_user_id:
                    type: string
                    nullable: true
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details:
                    type: array
  /api/v1/auth/admin/login:
    post:
      operationId: adminLogin
      summary: Admin Login
      tags:
        - Authentication
      description: Admin login - returns JWT token for authorization. Supports both
        email/password and admin_token methods.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - required:
                    - email
                    - password
                  properties:
                    email:
                      type: string
                      format: email
                      description: Admin email address
                    password:
                      type: string
                      description: Admin password
                - required:
                    - admin_token
                  properties:
                    admin_token:
                      type: string
                      description: Direct admin token (from ADMIN_TOKEN env var)
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for admin authentication
                  admin:
                    type: object
                    properties:
                      role:
                        type: string
                      authenticated:
                        type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/forgot-password/send-otp:
    post:
      operationId: forgotPasswordSendOtp
      summary: Send OTP for Password Reset
      tags:
        - Authentication
      description: Send email OTP for password reset
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
        required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  email_masked:
                    type: string
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/forgot-password/verify-otp:
    post:
      operationId: forgotPasswordVerifyOtp
      summary: Verify OTP for Password Reset
      tags:
        - Authentication
      description: Verify email OTP for password reset
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: ^[0-9]{6}$
        required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  resetToken:
                    type: string
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/forgot-password/reset:
    post:
      operationId: forgotPasswordReset
      summary: Reset Password
      tags:
        - Authentication
      description: Reset password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - resetToken
                - newPassword
              properties:
                email:
                  type: string
                  format: email
                resetToken:
                  type: string
                newPassword:
                  type: string
                  minLength: 6
        required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/auth/referrer/{displayId}:
    get:
      summary: Get Referrer Name
      tags:
        - Authentication
      description: Get referrer name by display_id (public endpoint for registration)
      parameters:
        - schema:
            type: string
          in: path
          name: displayId
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  display_id:
                    type: string
                  name:
                    type:
                      - "null"
                      - string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/dashboard/:
    get:
      summary: Get Dashboard
      tags:
        - Dashboard
      description: Get user dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  wallet_balance:
                    type: number
                  total_earnings:
                    type: number
                  pending_commissions:
                    type: number
                  total_commissions:
                    type: number
                  commission_by_type:
                    type: object
                    properties:
                      SELF:
                        type: number
                      GLOBAL_HELPING:
                        type: number
                      SPOT:
                        type: number
                      MONTHLY:
                        type: number
                  direct_referral_commission:
                    type: number
                  global_helping_team:
                    type: object
                    properties:
                      current:
                        type: number
                      total:
                        type: number
                  team_balance:
                    type: number
                  team_stats:
                    type: object
                    properties:
                      direct_referrals:
                        type: number
                      total_team_size:
                        type: number
                      active_members:
                        type: number
                      total_business_volume:
                        type: number
                  purchase_stats:
                    type: object
                    properties:
                      total_purchases:
                        type: number
                      total_spent:
                        type: number
                      active_packages:
                        type: number
                  recent_activity:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        description:
                          type: string
                        amount:
                          type:
                            - "null"
                            - number
                        date:
                          type: string
                          format: date-time
  /api/v1/dashboard/commissions-summary:
    get:
      summary: Get Commission Summary
      tags:
        - Dashboard
      description: Get commission summary by type
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_earned:
                    type: number
                  by_type:
                    type: object
                    properties:
                      SELF:
                        type: object
                        properties:
                          total:
                            type: number
                          count:
                            type: number
                      GLOBAL_HELPING:
                        type: object
                        properties:
                          total:
                            type: number
                          count:
                            type: number
                      SPOT:
                        type: object
                        properties:
                          total:
                            type: number
                          count:
                            type: number
                      MONTHLY:
                        type: object
                        properties:
                          total:
                            type: number
                          count:
                            type: number
                  pending_amount:
                    type: number
  /api/v1/dashboard/wallet:
    get:
      summary: Get Wallet Balance
      tags:
        - Dashboard
      description: Get wallet balance
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  balance:
                    type: number
                  spot_balance:
                    type: number
                  other_balance:
                    type: number
                  team_royalty_balance:
                    type: number
                  main_locked_hold:
                    type: number
                  available_main_balance:
                    type: number
                  spot_team_withdraw_limit:
                    type: number
                  spot_team_withdraw_used:
                    type: number
                  spot_team_withdraw_remaining:
                    type: number
                  spot_team_withdraw_multiplier:
                    type: number
                  spot_team_limit_reached_at:
                    type:
                      - "null"
                      - string
                  spot_team_flush_active:
                    type: boolean
                  spot_locked_hold:
                    type: number
                  available_spot_balance:
                    type: number
                  spot_hold_details:
                    type: array
                    items:
                      type: object
                      properties:
                        ledger_id:
                          type: string
                        amount:
                          type: number
                        source_user_id:
                          type: string
                        source_display_id:
                          type: string
                        source_name:
                          type:
                            - "null"
                            - string
                        credited_at:
                          type: string
                        hold_until:
                          type: string
                        level:
                          type:
                            - "null"
                            - number
                        depth:
                          type:
                            - "null"
                            - number
  /api/v1/dashboard/business-volume:
    get:
      summary: Get Business Volume
      tags:
        - Dashboard
      description: Get business volume
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  total_business_volume:
                    type: number
                  direct_business:
                    type: number
                  team_business:
                    type: number
                  legs:
                    type: array
                    items:
                      type: object
                      properties:
                        leg_user_id:
                          type: string
                        leg_user_name:
                          type:
                            - "null"
                            - string
                        leg_business_volume:
                          type: number
                        direct_business:
                          type: number
                        team_business:
                          type: number
  /api/v1/dashboard/team-business:
    get:
      summary: Get Team Business
      tags:
        - Dashboard
      description: Get team business income summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_team_business:
                    type: number
                  breakdown:
                    type: object
                    properties:
                      spot_income:
                        type: object
                        properties:
                          total:
                            type: number
                          count:
                            type: number
                      monthly_income:
                        type: object
                        properties:
                          total:
                            type: number
                          count:
                            type: number
                  last_30_days:
                    type: object
                    properties:
                      spot:
                        type: number
                      monthly:
                        type: number
  /api/v1/dashboard/team-business-breakdown:
    get:
      summary: Get Team Business Breakdown
      tags:
        - Dashboard
      description: Get team business breakdown by level and month
      parameters:
        - schema:
            type: number
            default: 4
            minimum: 1
            maximum: 12
          in: query
          name: months
          required: false
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  levels:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          category:
                            type: string
                          spot_income:
                            type: number
                          monthly_royalty:
                            type: number
  /api/v1/dashboard/commission-trend:
    get:
      summary: Get Commission Trend
      tags:
        - Dashboard
      description: Get self commission trend for last N days
      parameters:
        - schema:
            type: number
            default: 30
            minimum: 1
            maximum: 90
          in: query
          name: days
          required: false
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: number
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        commission:
                          type: number
  /api/v1/dashboard/royalty-trend:
    get:
      summary: Get Royalty Trend
      tags:
        - Dashboard
      description: Get royalty trend for last 6 months
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        month:
                          type: string
                        royalty:
                          type: number
  /api/v1/dashboard/notices:
    get:
      summary: Get Dashboard Notices
      tags:
        - Dashboard
      description: Get active notices for dashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        title:
                          type: string
                        content:
                          type: string
                        link:
                          type:
                            - "null"
                            - string
                        created_at:
                          type: string
  /api/v1/dashboard/banners:
    get:
      summary: Get Dashboard Banners
      tags:
        - Dashboard
      description: Get active banners for dashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        title:
                          type: string
                        image_url:
                          type: string
                        link:
                          type:
                            - "null"
                            - string
                        display_order:
                          type: number
  /api/v1/income-history/self-income:
    get:
      summary: Get Self Income
      tags:
        - Income History
      description: Get SELF commissions only
      parameters:
        - schema:
            type: number
            default: 1
            minimum: 1
          in: query
          name: page
          required: false
        - schema:
            type: number
            default: 20
            minimum: 1
            maximum: 100
          in: query
          name: limit
          required: false
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
  /api/v1/income-history/global-help-income:
    get:
      summary: Get Global Help Income
      tags:
        - Income History
      description: Get GLOBAL_HELPING commissions only
      parameters:
        - schema:
            type: number
            default: 1
          in: query
          name: page
          required: false
        - schema:
            type: number
            default: 20
          in: query
          name: limit
          required: false
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
  /api/v1/income-history/spot-income:
    get:
      summary: Get Spot Income
      tags:
        - Income History
      description: Get SPOT commissions only
      parameters:
        - schema:
            type: number
            default: 1
          in: query
          name: page
          required: false
        - schema:
            type: number
            default: 20
          in: query
          name: limit
          required: false
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
  /api/v1/income-history/team-income:
    get:
      summary: Get Team Income
      tags:
        - Income History
      description: Get MONTHLY commissions only
      parameters:
        - schema:
            type: number
